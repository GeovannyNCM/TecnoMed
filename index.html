<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TecnoMed | Productos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>TecnoMed</h1>
    <p>Catálogo de categorías y productos médicos/tecnológicos</p>
    <a class="admin-link" href="admin.php">Gestionar productos (PHP)</a>
  </header>

  <main class="container">
    <section>
      <h2>Categorías</h2>
      <div id="categories" class="category-grid">
        <button class="chip active" data-category="">Todas</button>
        <button class="chip" data-category="Cuidados">Cuidados</button>
        <button class="chip" data-category="Diagnostico">Diagnostico</button>
        <button class="chip" data-category="Emergencia">Emergencia</button>
        <button class="chip" data-category="Equipos">Equipos</button>
        <button class="chip" data-category="Intrumental">Intrumental</button>
        <button class="chip" data-category="Insumos">Insumos</button>
        <button class="chip" data-category="Mobiliario">Mobiliario</button>
        <button class="chip" data-category="Indumentaria">Indumentaria</button>
        <button class="chip" data-category="Oxigenoterapia">Oxigenoterapia</button>
      </div>
    </section>

    <section>
      <h2>Productos</h2>
      <div id="products" class="product-grid"></div>
      <p id="emptyState" class="empty hidden">No hay productos cargados todavía.</p>
    </section>
  </main>

  <script>
    const BASE_CATEGORIES = [
      'Cuidados',
      'Diagnostico',
      'Emergencia',
      'Equipos',
      'Intrumental',
      'Insumos',
      'Mobiliario',
      'Indumentaria',
      'Oxigenoterapia'
    ];

    const categoriesEl = document.getElementById('categories');
    const productsEl = document.getElementById('products');
    const emptyStateEl = document.getElementById('emptyState');
    let allProducts = [];
    const chipSelector = '#categories .chip';

    function bindCategoryEvents() {
      const chips = document.querySelectorAll(chipSelector);
      chips.forEach(chip => {
        chip.onclick = () => {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          const selectedCategory = chip.dataset.category || '';
          if (!selectedCategory) {
            renderProducts(allProducts);
            return;
          }
          renderProducts(allProducts.filter(p => p.category === selectedCategory));
        };
      });
    }

    function renderCategories(products) {
      const extraCategories = [...new Set(products.map(p => p.category).filter(Boolean))]
        .filter(c => !BASE_CATEGORIES.includes(c));
      extraCategories.forEach(category => {
        const btn = document.createElement('button');
        btn.textContent = category;
        btn.className = 'chip';
        btn.dataset.category = category;
        categoriesEl.appendChild(btn);
      });

      bindCategoryEvents();
    }

    function renderProducts(products) {
      productsEl.innerHTML = '';
      if (!products.length) {
        emptyStateEl.classList.remove('hidden');
        return;
      }
      emptyStateEl.classList.add('hidden');

      products.forEach(product => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <img src="${product.image || 'https://via.placeholder.com/600x400?text=TecnoMed'}" alt="${product.name}" />
          <h3>${product.name}</h3>
          <p><strong>Categoría:</strong> ${product.category}</p>
          <p>${product.description || 'Sin descripción'}</p>
          <p><strong>Precio:</strong> $${Number(product.price).toFixed(2)}</p>
          <p><strong>Stock:</strong> ${product.stock}</p>
        `;
        productsEl.appendChild(card);
      });
    }

    bindCategoryEvents();

    fetch('data/products.json')
      .then(res => res.json())
      .then(data => {
        allProducts = Array.isArray(data) ? data : [];
        renderCategories(allProducts);
        renderProducts(allProducts);
      })
      .catch(() => {
        renderCategories([]);
        emptyStateEl.classList.remove('hidden');
        emptyStateEl.textContent = 'Error al cargar productos.';
      });
  </script>
</body>
</html>
