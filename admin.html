<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin TecnoMed (HTML)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Panel Admin TecnoMed (sin PHP)</h1>
    <p>Gestiona productos con localStorage del navegador.</p>
    <a class="admin-link" href="index.html">Ver catálogo</a>
  </header>

  <main class="container split">
    <section>
      <h2>Nuevo producto</h2>
      <p class="msg">Este panel no usa PHP. Los datos se guardan en tu navegador.</p>
      <form id="productForm" class="form-grid">
        <label>Nombre
          <input type="text" name="name" required />
        </label>
        <label>Categoría
          <select name="category" required>
            <option>Cuidados</option>
            <option>Diagnostico</option>
            <option>Emergencia</option>
            <option>Equipos</option>
            <option>Intrumental</option>
            <option>Insumos</option>
            <option>Mobiliario</option>
            <option>Indumentaria</option>
            <option>Oxigenoterapia</option>
          </select>
        </label>
        <label>Descripción
          <textarea name="description" rows="3"></textarea>
        </label>
        <label>Precio
          <input type="number" step="0.01" min="0" name="price" required />
        </label>
        <label>Stock inicial
          <input type="number" min="0" name="stock" value="0" required />
        </label>
        <label>Imagen
          <input type="file" name="image" accept=".jpg,.jpeg,.png,.webp" />
        </label>
        <button type="submit">Guardar producto</button>
      </form>

      <div class="actions-row">
        <button id="exportBtn" type="button">Exportar JSON</button>
        <button id="resetBtn" type="button">Restaurar demo</button>
      </div>
    </section>

    <section>
      <h2>Productos guardados</h2>
      <div id="stockList" class="stock-list"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'tecnomed_products';
    const form = document.getElementById('productForm');
    const stockList = document.getElementById('stockList');
    const exportBtn = document.getElementById('exportBtn');
    const resetBtn = document.getElementById('resetBtn');
    let products = [];

    function saveProducts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    }

    function readAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderStock() {
      stockList.innerHTML = '';
      if (!products.length) {
        stockList.innerHTML = '<p class="empty">No hay productos guardados.</p>';
        return;
      }

      products.forEach((product) => {
        const article = document.createElement('article');
        article.className = 'stock-item';
        article.innerHTML = `
          <div>
            <strong>${product.name}</strong>
            <p>${product.category} | Stock: ${product.stock}</p>
          </div>
          <form class="inline-form" data-id="${product.id}">
            <input type="number" name="stock" min="0" value="${product.stock}" required />
            <button type="submit">Actualizar</button>
            <button type="button" data-delete="${product.id}">Eliminar</button>
          </form>
        `;
        stockList.appendChild(article);
      });

      stockList.querySelectorAll('form[data-id]').forEach((f) => {
        f.addEventListener('submit', (event) => {
          event.preventDefault();
          const id = f.dataset.id;
          const stock = Math.max(0, Number(f.stock.value || 0));
          products = products.map((p) => p.id === id ? { ...p, stock } : p);
          saveProducts();
          renderStock();
        });
      });

      stockList.querySelectorAll('button[data-delete]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.delete;
          products = products.filter((p) => p.id !== id);
          saveProducts();
          renderStock();
        });
      });
    }

    async function loadProducts() {
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) {
        products = JSON.parse(local);
        renderStock();
        return;
      }

      try {
        const response = await fetch('data/products.json');
        const data = await response.json();
        products = Array.isArray(data) ? data : [];
      } catch {
        products = [];
      }
      saveProducts();
      renderStock();
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const fd = new FormData(form);
      const imageFile = fd.get('image');
      const image = await readAsDataUrl(imageFile && imageFile.size ? imageFile : null);

      products.push({
        id: `tm_${Date.now()}_${Math.random().toString(16).slice(2)}`,
        name: String(fd.get('name') || '').trim(),
        category: String(fd.get('category') || 'Cuidados').trim(),
        description: String(fd.get('description') || '').trim(),
        price: Number(fd.get('price') || 0),
        stock: Math.max(0, Number(fd.get('stock') || 0)),
        image,
      });

      saveProducts();
      renderStock();
      form.reset();
      form.stock.value = 0;
    });

    exportBtn.addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'products.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    resetBtn.addEventListener('click', async () => {
      localStorage.removeItem(STORAGE_KEY);
      await loadProducts();
    });

    loadProducts();
  </script>
</body>
</html>
